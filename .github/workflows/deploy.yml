name: Deploy to VM7000

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Pull and deploy
        run: |
          cd /data/home/dmstic/app
          git pull origin main
          composer install --no-dev --optimize-autoloader --quiet
          php artisan config:cache
          php artisan view:cache
          php artisan route:cache
          echo "Deploy OK: $(date)"

      - name: Health check
        run: curl -sf https://dmstic.netol.com/ -o /dev/null && echo "app OK" || echo "WARN app not responding"
