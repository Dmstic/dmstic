name: Deploy to VM7000

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy Laravel app
        run: |
          set -e
          APP_DIR="/data/home/dmstic/app"
          cd "$APP_DIR"
          git pull origin main
          composer install --no-dev --optimize-autoloader --quiet
          php artisan config:cache
          php artisan view:cache
          php artisan route:cache
          echo "Deploy complete: $(date)"

      - name: Verify app is up
        run: curl -sf https://dmstic.netol.com/ -o /dev/null && echo "OK: app responding" || echo "WARN: app not responding"
